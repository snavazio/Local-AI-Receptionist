# ============================================================================
# BATCH 1 — happy_path variants (20 cases)
# Each existing happy_path case gets two cousins:
#   - _alt_values: same flow, different name/phone/time. Tests value-independence —
#     the LLM should not be anchoring on previously-seen values.
#   - _phrasing: alternate caller phrasing of the same intent. Tests phrasing-
#     independence — the LLM should recognize a booking request even when the
#     caller's words differ from the original case.
# ============================================================================

- id: happy_path_basic_alt_values
  category: happy_path
  description: |
    Variant of happy_path_basic with completely different name, phone, and
    time values. Verifies the LLM doesn't anchor on previously-seen values
    when the same flow is exercised.
  user_turns:
    - "I'd like to book a cleaning for next Wednesday."
    - "My name is Priya Sharma."
    - "Six four six, two zero two, eight one three nine."
    - "Yes, that's correct."
    - "Three PM."
    - "No, that's all, thanks."
  expect:
    tool_called: book_appointment_callback
    tool_args_contain:
      caller_name: "priya"
      callback_number: "6462028139"
    assistant_must_not_say:
      - "I have a slot at"
      - "your appointment is booked"
    max_assistant_farewells: 1

- id: happy_path_basic_phrasing
  category: happy_path
  description: |
    Variant of happy_path_basic with the same intent expressed in different
    phrasing ("get on the schedule" instead of "book"). Verifies phrasing-
    independence.
  user_turns:
    - "Hi, I want to get on the schedule for a cleaning."
    - "Tuesday."
    - "Diane Williams."
    - "Eight zero five, five five five, zero one nine four."
    - "Yes."
    - "Eleven AM."
    - "Nope, that's it."
  expect:
    tool_called: book_appointment_callback
    tool_args_contain:
      caller_name: "diane"
      callback_number: "8055550194"
    max_assistant_farewells: 1

- id: happy_path_friday_morning_alt_values
  category: happy_path
  description: |
    Friday morning variant with different caller identity. Tests value
    independence on the morning-time pattern specifically.
  user_turns:
    - "Can I get an appointment Friday morning?"
    - "Carlos Mendoza."
    - "Three one zero, five five five, zero one seven seven."
    - "Yes."
    - "Ten AM works."
    - "No thanks."
  expect:
    tool_called: book_appointment_callback
    tool_args_contain:
      caller_name: "carlos"
      callback_number: "3105550177"
    max_assistant_farewells: 1

- id: happy_path_friday_morning_phrasing
  category: happy_path
  description: |
    Friday morning request phrased as 'first thing Friday' instead of
    'Friday morning'. Tests that the LLM recognizes synonymous time phrases.
  user_turns:
    - "I'd like to come in first thing Friday."
    - "Eight AM is good."
    - "Aisha Khan."
    - "Two zero two, five five five, zero one three three."
    - "Yes."
    - "No."
  expect:
    tool_called: book_appointment_callback
    tool_args_contain:
      caller_name: "aisha"
      callback_number: "2025550133"
    max_assistant_farewells: 1

- id: happy_path_specific_dentist_alt_values
  category: happy_path
  description: |
    Filling-procedure variant with different caller. Verifies the
    procedure-mention doesn't anchor the LLM on prior caller details.
  user_turns:
    - "I need to come in for a filling next Thursday."
    - "Vikram Iyer."
    - "Four oh eight, five five five, zero one six six."
    - "Yes that's correct."
    - "Two PM."
    - "No, all good."
  expect:
    tool_called: book_appointment_callback
    tool_args_contain:
      caller_name: "vikram"
      callback_number: "4085550166"
    max_assistant_farewells: 1

- id: happy_path_specific_dentist_phrasing
  category: happy_path
  description: |
    Filling request phrased with 'tooth needs work' instead of explicitly
    naming the procedure. Tests that the LLM books regardless of how
    specific the procedure description is.
