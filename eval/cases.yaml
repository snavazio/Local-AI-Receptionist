# 100 eval cases across 10 categories.
#
# Schema:
#   id, category, description
#   user_turns: list of caller utterances (text, no audio)
#   expect:
#     tool_called: name of tool that MUST be called (or null)
#     tool_args_contain: substring-match on tool args (case-insensitive)
#                        callback_number is normalized to digits before matching
#     tool_must_not_be_called: list of tool names that must NOT fire
#     assistant_must_say_any: assistant must say one of these substrings
#     assistant_must_not_say: assistant must not say any of these substrings
#     max_assistant_farewells: max farewell-shaped sentences (default 1)

# ============================================================================
# CATEGORY 1: happy_path — straightforward bookings
# ============================================================================

- id: happy_path_basic
  category: happy_path
  description: Standard appointment-booking flow
  user_turns:
    - "I'd like to book a cleaning for next Tuesday."
    - "My name is Steve."
    - "Two zero one, three eight eight, two one four nine."
    - "Yes, that's correct."
    - "Two PM."
    - "No, that's all, thanks."
  expect:
    tool_called: book_appointment_callback
    tool_args_contain:
      caller_name: "steve"
      callback_number: "2013882149"
    assistant_must_not_say:
      - "I have a slot at"
      - "your appointment is booked"
    max_assistant_farewells: 1

