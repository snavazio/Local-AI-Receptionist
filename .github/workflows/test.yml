name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv sync --frozen
          uv pip install pytest

      - name: Lint syntax
        run: |
          for f in bot.py bot_flows.py eval/*.py tests/*.py tools/*.py; do
            uv run python -c "import ast; ast.parse(open('$f').read())" && echo "OK $f"
          done

      - name: Run unit tests
        run: uv run pytest -q

  notes:
    runs-on: ubuntu-latest
    steps:
      - run: echo "The 100-case eval (eval/run_eval.py) requires a local GPU + Ollama and is not run in CI. Run it on your dev machine via 'make watch' before merging changes that touch bot.py / eval/."
