# Reverse-proxy from the CasaOS-managed container to the host-side dashboard.
# host.docker.internal resolves to the host gateway thanks to extra_hosts in
# docker-compose.yml.

server {
    listen 80;
    server_name _;

    # Larger timeouts so long-running evals don't drop the SSE/poll connection.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;

    location / {
        proxy_pass http://host.docker.internal:5055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
